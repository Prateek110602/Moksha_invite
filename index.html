<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moksha Invite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { transition: background 0.6s ease; overflow-x:hidden; }
    .dark-bg { background: #1f160f; }

    .door-wrap { position: relative; perspective: 1200px; }
    .door {
      width: 220px; height: 340px;
      background: linear-gradient(145deg,#7a5a42,#5b3f2d);
      border-radius: 12px; position: relative; cursor: pointer;
      transform-origin: left; transition: transform 1.1s cubic-bezier(.77,0,.18,1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .door.peek { transform: rotateY(-20deg); }
    .door.open { transform: rotateY(-105deg); }

    .knob {
      width: 16px; height: 16px; background: #e6d5c3; border-radius: 50%;
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%{transform:translateY(-50%) scale(1)} 50%{transform:translateY(-50%) scale(1.15)} 100%{transform:translateY(-50%) scale(1)} }

    .light {
      position:absolute; inset:0;
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,220,170,0.5), transparent 60%);
      opacity:0; transition: opacity .4s ease;
      pointer-events:none; border-radius: 12px;
    }
    .door-wrap:hover .light { opacity:1; }

    .fade-in { animation: fadeIn 1s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(20px);} to { opacity:1; transform: translateY(0);} }

    .particle { position:absolute; width:6px; height:6px; background:#f5e6d3; border-radius:50%; opacity:.7; animation: float 3s linear infinite; }
    @keyframes float { from { transform: translateY(0) scale(1); opacity:.7;} to { transform: translateY(-200px) scale(.5); opacity:0;} }

    .btn { transition: transform .2s ease, left .2s ease, top .2s ease; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#f5efe6] via-[#e8dccf] to-[#d6c3b3] flex items-center justify-center p-6 text-center">

<div id="app" class="w-full max-w-2xl relative"></div>

<script>
let stage = 0; // 0=closed,1=peek,2=open
let showMessage = false;
let response = null;
let noClicks = 0;
let noPos = {x:0,y:0};

function particles() {
  let html = "";
  for(let i=0;i<12;i++){
    const left = Math.random()*100;
    const delay = Math.random()*2;
    html += `<div class=\"particle\" style=\"left:${left}%; bottom:0; animation-delay:${delay}s\"></div>`;
  }
  return html;
}

function render() {
  const yesScale = 1 + noClicks * 0.2;
  const hideNo = noClicks >= 6;

  document.getElementById('app').innerHTML = `

  ${stage < 2 ? `
    <div class=\"flex flex-col items-center gap-6\">
      <div class=\"door-wrap\" onmousemove=\"moveLight(event)\">
        <div onclick=\"tapDoor()\" class=\"door ${stage===1?'peek':''}\" id=\"door\">
          <div class=\"knob\"></div>
        </div>
        <div class=\"light\" id=\"light\"></div>
      </div>
      <p class=\"text-[#5c4a38]\">${stage===0?'Tap the door 🚪':'Are you sure? Tap again… 😏'}</p>
    </div>
  ` : `

    <div class=\"fade-in\">
      ${particles()}

      <h1 class=\"text-4xl md:text-6xl font-bold text-[#4b3b2a] mb-4\">Heyyyy Mrignaini!!!</h1>

      <p class=\"text-lg text-[#5c4a38] mb-6\">
        We met at Moksha on <b>19th & 20th April 2025</b>… and somehow that turned into *this* ✨
      </p>

      <div class=\"grid md:grid-cols-2 gap-6 mb-8\">
        <div class=\"bg-[#fdfaf6] rounded-2xl shadow-lg p-4\">
          <p class=\"font-semibold mb-2 text-[#4b3b2a]\">The day we met</p>
          <img src=\"images1.jpg\" class=\"rounded-xl\" />
        </div>

        <div class=\"bg-[#fdfaf6] rounded-2xl shadow-lg p-4\">
          <p class=\"font-semibold mb-2 text-[#4b3b2a]\">Us now</p>
          <img src=\"images2.jpg\" class=\"rounded-xl\" />
        </div>
      </div>

      <div class=\"bg-[#fdfaf6] rounded-2xl shadow-lg p-6 mb-8\">
        <p class=\"text-xl text-[#4b3b2a]\">Moksha 2026</p>
        <div class=\"h-40 flex items-center justify-center text-5xl text-[#a89a8a] border-2 border-dashed rounded-xl\">?</div>
      </div>

      ${!showMessage ? `
        <button onclick=\"reveal()\" class=\"bg-[#6b4f3a] text-white px-6 py-3 rounded-2xl text-lg\">Tap to Reveal</button>
      ` : `
        <div class=\"bg-[#fdfaf6] rounded-2xl shadow-lg p-6 relative\">
          <p class=\"text-lg text-[#5c4a38] mb-6\">
            Ready for another guilt trip<br/><br/>
            Let’s go back where it all started<br/>
            Moksha 2026 — <b>28th & 29th March</b><br/><br/>
            Will you come with me?
          </p>

          ${!response ? `
            <div class=\"flex gap-4 justify-center items-center relative h-16\">
              <button onclick=\"sayYes()\" style=\"transform: scale(${yesScale})\" class=\"btn bg-[#4b3b2a] text-white px-6 py-2 rounded-xl\">Yes</button>

              ${!hideNo ? `
                <button onmouseover=\"dodgeNo()\" onclick=\"clickNo()\" id=\"noBtn\" style=\"position:relative; left:${noPos.x}px; top:${noPos.y}px\" class=\"btn bg-[#a89a8a] text-white px-6 py-2 rounded-xl\">No</button>
              ` : ''}
            </div>
          ` : `
            <div class=\"mt-6\" id=\"celebrate\">
              <p class=\"text-2xl font-semibold text-[#4b3b2a]\">YAAAYYYY!!! 🎉</p>
              <p class=\"text-[#5c4a38] mt-2\">See you at Moksha 2026 💫</p>
            </div>
          `}
        </div>
      `}
    </div>
  `}
  `;
}

function moveLight(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const x = ((e.clientX - rect.left)/rect.width)*100;
  const y = ((e.clientY - rect.top)/rect.height)*100;
  const light = document.getElementById('light');
  if(light){ light.style.setProperty('--x', x+'%'); light.style.setProperty('--y', y+'%'); }
}

function tapDoor(){
  if(stage===0){
    stage=1;
  } else if(stage===1){
    document.body.classList.add('dark-bg');
    const door = document.getElementById('door');
    door.classList.add('open');
    setTimeout(()=>{ stage=2; document.body.classList.remove('dark-bg'); render(); }, 900);
  }
  render();
}

function reveal(){ showMessage = true; render(); }

function sayYes(){
  response = 'yes';
  render();
  burstHearts();
}

function clickNo(){ noClicks++; render(); }

function dodgeNo(){
  noPos.x = (Math.random()*120)-60;
  noPos.y = (Math.random()*40)-20;
  render();
}

function burstHearts(){
  const container = document.getElementById('celebrate');
  if(!container) return;
  for(let i=0;i<12;i++){
    const el = document.createElement('div');
    el.textContent = '💖';
    el.style.position='absolute';
    el.style.left = (Math.random()*100)+'%';
    el.style.top = '60%';
    el.style.fontSize = (16+Math.random()*20)+'px';
    el.style.transition = 'all 1s ease';
    container.appendChild(el);
    setTimeout(()=>{
      el.style.transform = `translateY(-120px) rotate(${Math.random()*60-30}deg)`;
      el.style.opacity = 0;
    },10);
    setTimeout(()=> el.remove(), 1100);
  }
}

render();
</script>

</body>
</html>
